<!DOCTYPE html>
<html lang="en" style="--font-size-scale: 1.0;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathshala AI - Offline Learning Operating System</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Tailwind CSS & Configuration -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#3525cd",
            "primary-container": "#4f46e5",
            secondary: "#00668a",
            "secondary-container": "#40c2fd",
            background: "#f8f9ff",
            surface: "#ffffff",
            "surface-container": "#e5eeff"
          },
          fontFamily: {
            sans: ["Inter", "sans-serif"],
            headline: ["Outfit", "sans-serif"]
          }
        }
      }
    }
  </script>
  
  <link rel="stylesheet" href="./styles.css">
  <link rel="manifest" href="./manifest.webmanifest">
</head>
<body>
  <!-- Clean Full-Screen Application Shell -->
  <div class="app-shell">
    
    <!-- Top Minimalist Status bar (Calming, clean, Apple-inspired) -->
    <header class="app-header">
      <div class="header-left">
        <span class="logo-text cursor-pointer hover:opacity-80 transition-opacity" id="btn-logo-home">Pathshala AI</span>
        <span class="offline-dot-badge">● Local AI Engine Active</span>
      </div>
      <div class="header-center flex gap-6">
        <div class="nav-item active px-3 py-1.5 rounded-lg cursor-pointer text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center" data-route="dashboard">
          <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          Home
        </div>
        <div class="nav-item px-3 py-1.5 rounded-lg cursor-pointer text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center" data-route="subjects">
          <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
          Learn
        </div>
        <div class="nav-item px-3 py-1.5 rounded-lg cursor-pointer text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center" data-route="aiTutor">
          <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
          AI Tutor
        </div>
        <div class="nav-item px-3 py-1.5 rounded-lg cursor-pointer text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center" data-route="practice">
          <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
          Practice
        </div>
        <div class="nav-item px-3 py-1.5 rounded-lg cursor-pointer text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center" data-route="profile">
          <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          Profile
        </div>
      </div>
      <div class="header-right">
        <span id="streak-indicator-top">🔥 1 Day Streak</span>
      </div>
    </header>

    <!-- Scrollable container wrapper for desktop web app -->
    <div class="app-main-viewport-wrapper">
      <!-- Main Dynamic Content Canvas (Centered with generous padding & breathing room) -->
      <main class="app-main-canvas" id="phone-screen-container">
        <!-- Dynamic pages rendered here -->
      </main>
    </div>
  </div>

  <!-- Hidden Judge Mode Telemetry Container (Invisible to normal users, toggles via Ctrl+Shift+D) -->
  <div id="dev-telemetry-container" class="telemetry-overlay-hidden"></div>

  <!-- Boot Scripts -->
  <script type="module" src="./src/core/app.js"></script>

  <!-- Keyboard Shortcuts & Theme Boot -->
  <script type="module">
    import { router } from "./src/core/router.js";
    
    // Toggle Debugger overlay with Ctrl+Shift+D
    window.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.shiftKey && e.code === "KeyD") {
        e.preventDefault();
        const container = document.getElementById("dev-telemetry-container");
        if (container) {
          container.classList.toggle("telemetry-overlay-hidden");
          container.classList.toggle("telemetry-overlay-visible");
        }
      }
    });

    // Hash navigation sync
    window.addEventListener("hashchange", () => {
      const hash = window.location.hash.substring(1);
      if (hash && router.routes[hash]) {
        router.navigate(hash);
      }
    });
  </script>
</body>
</html>
