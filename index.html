<!DOCTYPE html>
<html lang="en" style="--font-size-scale: 1.0;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathshala AI - Offline Learning Operating System</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Tailwind CSS & Configuration -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#6E4CE3",
            "primary-container": "#ECE6FF",
            secondary: "#F2A33A",
            "secondary-container": "#FFE5B8",
            tertiary: "#4E7A45",
            background: "#FFF8F1",
            surface: "#FFFCF8",
            "surface-container": "#F8F0E6",
            "on-background": "#1E1B18",
            "on-surface": "#231F1C"
          },
          fontFamily: {
            sans: ["Manrope", "sans-serif"],
            serif: ["Newsreader", "serif"],
            headline: ["Newsreader", "serif"]
          }
        }
      }
    }
  </script>
  
  <link rel="stylesheet" href="./styles.css">
  <link rel="manifest" href="./manifest.webmanifest">
</head>
<body>
  <!-- React Mount Point -->
  <div id="root"></div>

  <!-- Hidden Judge Mode Telemetry Container (Invisible to normal users, toggles via Ctrl+Shift+D) -->
  <div id="dev-telemetry-container" class="telemetry-overlay-hidden"></div>

  <!-- Boot React Script -->
  <script type="module" src="./src/main.tsx"></script>

  <!-- Keyboard Shortcuts & Theme Boot -->
  <script type="module">
    // Toggle Debugger overlay with Ctrl+Shift+D
    window.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.shiftKey && e.code === "KeyD") {
        e.preventDefault();
        const container = document.getElementById("dev-telemetry-container");
        if (container) {
          container.classList.toggle("telemetry-overlay-hidden");
          container.classList.toggle("telemetry-overlay-visible");
        }
      }
    });
  </script>
</body>
</html>
