<!DOCTYPE html>
<html lang="en" style="--font-size-scale: 1.0;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathshala AI - Offline Learning Operating System</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./styles.css">
  <link rel="manifest" href="./manifest.webmanifest">
</head>
<body>
  <!-- Clean Full-Screen Application Shell -->
  <div class="app-shell">
    
    <!-- Top Minimalist Status bar (Calming, clean, Apple-inspired) -->
    <header class="app-header">
      <div class="header-left">
        <span class="logo-text">Pathshala AI</span>
        <span class="offline-dot-badge">● Local AI Engine Active</span>
      </div>
      <div class="header-right">
        <span id="streak-indicator-top">🔥 1 Day Streak</span>
      </div>
    </header>

    <!-- Main Dynamic Content Canvas (Centered with generous padding & breathing room) -->
    <main class="app-main-canvas" id="phone-screen-container">
      <!-- Dynamic pages rendered here -->
    </main>

    <!-- Bottom Navigation Bar (Elegant, floating-pill-like or clean bottom-bar) -->
    <nav class="app-navigation-bar">
      <div class="nav-item active" data-route="dashboard">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </div>
      <div class="nav-item" data-route="subjects">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Learn</span>
      </div>
      <div class="nav-item" data-route="aiTutor">
        <span class="nav-icon">🤖</span>
        <span class="nav-label">AI Tutor</span>
      </div>
      <div class="nav-item" data-route="practice">
        <span class="nav-icon">📝</span>
        <span class="nav-label">Practice</span>
      </div>
      <div class="nav-item" data-route="profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
      </div>
    </nav>
  </div>

  <!-- Hidden Judge Mode Telemetry Container (Invisible to normal users, toggles via Ctrl+Shift+D) -->
  <div id="dev-telemetry-container" class="telemetry-overlay-hidden"></div>

  <!-- Boot Scripts -->
  <script type="module" src="./src/core/app.js"></script>

  <!-- Keyboard Shortcuts & Theme Boot -->
  <script type="module">
    import { router } from "./src/core/router.js";
    
    // Toggle Debugger overlay with Ctrl+Shift+D
    window.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.shiftKey && e.code === "KeyD") {
        e.preventDefault();
        const container = document.getElementById("dev-telemetry-container");
        if (container) {
          container.classList.toggle("telemetry-overlay-hidden");
          container.classList.toggle("telemetry-overlay-visible");
        }
      }
    });

    // Hash navigation sync
    window.addEventListener("hashchange", () => {
      const hash = window.location.hash.substring(1);
      if (hash && router.routes[hash]) {
        router.navigate(hash);
      }
    });
  </script>
</body>
</html>
