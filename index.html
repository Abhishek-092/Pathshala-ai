<!DOCTYPE html>
<html lang="en" style="--font-size-scale: 1.0;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathshala AI - Offline Learning Operating System</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Tailwind CSS & Configuration -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#3525cd",
            "primary-container": "#4f46e5",
            secondary: "#00668a",
            "secondary-container": "#40c2fd",
            background: "#f8f9ff",
            surface: "#ffffff",
            "surface-container": "#e5eeff"
          },
          fontFamily: {
            sans: ["Inter", "sans-serif"],
            headline: ["Outfit", "sans-serif"]
          }
        }
      }
    }
  </script>
  
  <link rel="stylesheet" href="./styles.css">
  <link rel="manifest" href="./manifest.webmanifest">
</head>
<body>
  <!-- Clean Full-Screen Application Shell -->
  <div class="app-shell">
    
    <!-- Top Minimalist Status bar (Calming, clean, Apple-inspired) -->
    <header class="app-header">
      <div class="header-left">
        <span class="logo-text">Pathshala AI</span>
        <span class="offline-dot-badge">● Local AI Engine Active</span>
      </div>
      <div class="header-center flex gap-6">
        <div class="nav-item active px-3 py-1.5 rounded-lg cursor-pointer text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800" data-route="dashboard">Home</div>
        <div class="nav-item px-3 py-1.5 rounded-lg cursor-pointer text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800" data-route="subjects">Learn</div>
        <div class="nav-item px-3 py-1.5 rounded-lg cursor-pointer text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800" data-route="aiTutor">AI Tutor</div>
        <div class="nav-item px-3 py-1.5 rounded-lg cursor-pointer text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800" data-route="practice">Practice</div>
        <div class="nav-item px-3 py-1.5 rounded-lg cursor-pointer text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800" data-route="profile">Profile</div>
      </div>
      <div class="header-right">
        <span id="streak-indicator-top">🔥 1 Day Streak</span>
      </div>
    </header>

    <!-- Main Dynamic Content Canvas (Centered with generous padding & breathing room) -->
    <main class="app-main-canvas" id="phone-screen-container">
      <!-- Dynamic pages rendered here -->
    </main>
  </div>

  <!-- Hidden Judge Mode Telemetry Container (Invisible to normal users, toggles via Ctrl+Shift+D) -->
  <div id="dev-telemetry-container" class="telemetry-overlay-hidden"></div>

  <!-- Boot Scripts -->
  <script type="module" src="./src/core/app.js"></script>

  <!-- Keyboard Shortcuts & Theme Boot -->
  <script type="module">
    import { router } from "./src/core/router.js";
    
    // Toggle Debugger overlay with Ctrl+Shift+D
    window.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.shiftKey && e.code === "KeyD") {
        e.preventDefault();
        const container = document.getElementById("dev-telemetry-container");
        if (container) {
          container.classList.toggle("telemetry-overlay-hidden");
          container.classList.toggle("telemetry-overlay-visible");
        }
      }
    });

    // Hash navigation sync
    window.addEventListener("hashchange", () => {
      const hash = window.location.hash.substring(1);
      if (hash && router.routes[hash]) {
        router.navigate(hash);
      }
    });
  </script>
</body>
</html>
